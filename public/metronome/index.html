<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metronome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c1a;
      --surface: #12122a;
      --border: rgba(100, 116, 139, 0.3);
      --indigo: #6366f1;
      --indigo-light: #818cf8;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --dim: #334155;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #9333ea);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 1rem; font-weight: 700; }
    header p  { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    main {
      flex: 1;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
    }

    /* BPM display */
    .bpm-card { text-align: center; }

    .bpm-number {
      font-size: 5.5rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -4px;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .tempo-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--indigo-light);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 0.4rem 0 1.5rem;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: var(--dim);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--indigo);
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .nudge-row {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .nudge-btn {
      padding: 0.3rem 0.7rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      font-size: 0.8rem;
      font-family: monospace;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .nudge-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* Beat visualizer */
    .beat-card { text-align: center; }
    .card-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    #beat-dots {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .dot {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 2px solid var(--dim);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      transition: transform 0.07s, background 0.07s, border-color 0.07s, color 0.07s, box-shadow 0.07s;
    }

    .dot.active-accent {
      background: var(--red);
      border-color: #f87171;
      color: #fff;
      transform: scale(1.28);
      box-shadow: 0 0 18px rgba(239,68,68,0.55);
    }

    .dot.active-beat {
      background: var(--indigo);
      border-color: var(--indigo-light);
      color: #fff;
      transform: scale(1.15);
      box-shadow: 0 0 14px rgba(99,102,241,0.5);
    }

    /* Controls row */
    .controls-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .sig-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .sig-btn {
      width: 36px; height: 36px;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .sig-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .sig-btn.active {
      background: var(--indigo);
      border-color: var(--indigo-light);
      color: #fff;
      box-shadow: 0 0 8px rgba(99,102,241,0.35);
    }

    .vol-value { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
    .vol-range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--dim);
      margin-top: 0.4rem;
    }

    /* Action row */
    .action-row {
      display: flex;
      gap: 0.75rem;
    }

    #toggle-btn {
      flex: 1;
      padding: 1rem;
      border-radius: 1rem;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: background 0.15s, transform 0.1s;
    }
    #toggle-btn:active { transform: scale(0.97); }
    #toggle-btn.stopped {
      background: var(--indigo);
      color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }
    #toggle-btn.running {
      background: var(--dim);
      color: #fff;
    }

    #tap-btn {
      padding: 1rem 1.2rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      line-height: 1.3;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    #tap-btn:hover { border-color: var(--indigo-light); color: #fff; background: rgba(99,102,241,0.08); }
    #tap-btn:active { transform: scale(0.96); }

    .hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--dim);
    }
    kbd {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.7rem;
      color: #94a3b8;
      font-family: monospace;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 1rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--dim);
    }

    @media (max-width: 400px) {
      .controls-row { grid-template-columns: 1fr; }
      .bpm-number { font-size: 4.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎵</div>
  <div>
    <h1>Metronome</h1>
    <p>Web Audio API · Precision timing</p>
  </div>
</header>

<main>

  <!-- BPM Card -->
  <div class="card bpm-card">
    <div class="bpm-number" id="bpm-display">120</div>
    <div class="tempo-label" id="tempo-label">Moderato · BPM</div>
    <input type="range" id="bpm-slider" min="20" max="300" value="120" />
    <div class="nudge-row">
      <button class="nudge-btn" data-delta="-10">−10</button>
      <button class="nudge-btn" data-delta="-5">−5</button>
      <button class="nudge-btn" data-delta="-1">−1</button>
      <button class="nudge-btn" data-delta="1">+1</button>
      <button class="nudge-btn" data-delta="5">+5</button>
      <button class="nudge-btn" data-delta="10">+10</button>
    </div>
  </div>

  <!-- Beat visualizer -->
  <div class="card beat-card">
    <div class="card-label">Beat</div>
    <div id="beat-dots"></div>
  </div>

  <!-- Time sig + Volume -->
  <div class="controls-row">
    <div class="card">
      <div class="card-label">Time Signature</div>
      <div class="sig-grid" id="sig-grid"></div>
      <div style="font-size:0.7rem;color:var(--dim);margin-top:0.5rem;" id="sig-label">4/4 time</div>
    </div>
    <div class="card">
      <div class="card-label">Volume</div>
      <div class="vol-value" id="vol-display">80%</div>
      <input type="range" id="vol-slider" min="0" max="100" value="80" />
      <div class="vol-range-labels"><span>Soft</span><span>Loud</span></div>
    </div>
  </div>

  <!-- Start/Stop + Tap -->
  <div class="action-row">
    <button id="toggle-btn" class="stopped">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="toggle-icon">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <span id="toggle-label">Start</span>
    </button>
    <button id="tap-btn">Tap<br><span style="font-weight:400;color:var(--muted)">Tempo</span></button>
  </div>

  <p class="hint">Press <kbd>Space</kbd> to start / stop</p>

</main>

<footer>Metronome · Web Audio API · Open Source</footer>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let bpm = 120;
  let beats = 4;
  let volume = 0.8;
  let running = false;
  let activeBeat = -1;

  // ── Audio ────────────────────────────────────────────────────────────────
  let audioCtx = null;
  let nextBeatTime = 0;
  let beatIndex = 0;
  let schedulerTimer = null;

  const LOOKAHEAD = 0.12;
  const INTERVAL  = 25;

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClick(time, isAccent) {
    const ctx = getCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(isAccent ? 1400 : 900, time);
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(volume, time + 0.003);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
    osc.start(time);
    osc.stop(time + 0.08);
  }

  function scheduler() {
    const ctx = getCtx();
    while (nextBeatTime < ctx.currentTime + LOOKAHEAD) {
      const idx  = beatIndex;
      const when = nextBeatTime;
      playClick(when, idx === 0);
      const delay = Math.max(0, (when - ctx.currentTime) * 1000);
      setTimeout(() => flashBeat(idx), delay);
      beatIndex    = (beatIndex + 1) % beats;
      nextBeatTime += 60 / bpm;
    }
    schedulerTimer = setTimeout(scheduler, INTERVAL);
  }

  async function start() {
    const ctx = getCtx();
    if (ctx.state === 'suspended') await ctx.resume();
    beatIndex    = 0;
    nextBeatTime = ctx.currentTime;
    running = true;
    updateToggleBtn();
    scheduler();
  }

  function stop() {
    running = false;
    clearTimeout(schedulerTimer);
    schedulerTimer = null;
    clearBeat();
    updateToggleBtn();
  }

  function toggle() {
    running ? stop() : start();
  }

  // ── Visual beat ──────────────────────────────────────────────────────────
  function flashBeat(idx) {
    clearBeat();
    activeBeat = idx;
    const dot = document.getElementById('dot-' + idx);
    if (dot) {
      dot.classList.add(idx === 0 ? 'active-accent' : 'active-beat');
    }
  }

  function clearBeat() {
    if (activeBeat >= 0) {
      const dot = document.getElementById('dot-' + activeBeat);
      if (dot) dot.classList.remove('active-accent', 'active-beat');
    }
    activeBeat = -1;
  }

  // ── BPM ──────────────────────────────────────────────────────────────────
  const TEMPOS = [
    [40,'Grave'],[60,'Largo'],[66,'Larghetto'],[76,'Adagio'],
    [108,'Andante'],[120,'Moderato'],[156,'Allegro'],
    [176,'Vivace'],[200,'Presto'],[999,'Prestissimo']
  ];
  function tempoLabel(b) {
    return (TEMPOS.find(([max]) => b <= max) || [,''])[1];
  }

  function setBpm(val) {
    bpm = Math.max(20, Math.min(300, Math.round(val)));
    document.getElementById('bpm-display').textContent = bpm;
    document.getElementById('bpm-slider').value = bpm;
    document.getElementById('tempo-label').textContent = tempoLabel(bpm) + ' · BPM';
  }

  // ── Time signature ───────────────────────────────────────────────────────
  function setBeats(n) {
    beats = n;
    beatIndex = 0;
    clearBeat();
    renderDots();
    document.querySelectorAll('.sig-btn').forEach(b => {
      b.classList.toggle('active', +b.dataset.beats === n);
    });
    document.getElementById('sig-label').textContent = n + '/4 time';
  }

  function renderDots() {
    const container = document.getElementById('beat-dots');
    container.innerHTML = '';
    for (let i = 0; i < beats; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.id = 'dot-' + i;
      d.textContent = i + 1;
      container.appendChild(d);
    }
  }

  function renderSigButtons() {
    const grid = document.getElementById('sig-grid');
    grid.innerHTML = '';
    [2,3,4,5,6,7,8].forEach(n => {
      const b = document.createElement('button');
      b.className = 'sig-btn' + (n === beats ? ' active' : '');
      b.dataset.beats = n;
      b.textContent = n;
      b.onclick = () => setBeats(n);
      grid.appendChild(b);
    });
  }

  // ── Toggle button ────────────────────────────────────────────────────────
  const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
  const ICON_STOP = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';

  function updateToggleBtn() {
    const btn   = document.getElementById('toggle-btn');
    const icon  = document.getElementById('toggle-icon');
    const label = document.getElementById('toggle-label');
    btn.className = running ? 'running' : 'stopped';
    icon.innerHTML = running ? ICON_STOP : ICON_PLAY;
    label.textContent = running ? 'Stop' : 'Start';
  }

  // ── Tap tempo ────────────────────────────────────────────────────────────
  let tapTimes = [];
  function handleTap() {
    const now = performance.now();
    tapTimes.push(now);
    if (tapTimes.length > 8) tapTimes.shift();
    if (tapTimes.length >= 2) {
      const gaps = tapTimes.slice(1).map((t,i) => t - tapTimes[i]);
      const avg  = gaps.reduce((a,b) => a+b, 0) / gaps.length;
      setBpm(Math.round(60000 / avg));
    }
  }

  // ── Event listeners ──────────────────────────────────────────────────────
  document.getElementById('bpm-slider').addEventListener('input', e => setBpm(+e.target.value));

  document.querySelectorAll('.nudge-btn').forEach(b => {
    b.addEventListener('click', () => setBpm(bpm + +b.dataset.delta));
  });

  document.getElementById('vol-slider').addEventListener('input', e => {
    volume = +e.target.value / 100;
    document.getElementById('vol-display').textContent = e.target.value + '%';
  });

  document.getElementById('toggle-btn').addEventListener('click', toggle);
  document.getElementById('tap-btn').addEventListener('click', handleTap);

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      toggle();
    }
  });

  // ── Init ─────────────────────────────────────────────────────────────────
  renderDots();
  renderSigButtons();
  setBpm(120);
</script>
</body>
</html>
